name: Validate static site

on:
  push:
    branches:
      - main
      - master
      - work
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run site checks
        run: python tools/check_site.py
